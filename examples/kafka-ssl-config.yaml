# Example Kafka SSL/TLS Configuration
# This file demonstrates how to configure Kafka clusters with SSL/TLS authentication

# Option 1: Using mounted certificates (recommended for production)
# Prerequisites:
#   1. Create Kubernetes secrets with your certificates:
#      kubectl create secret generic kafka-ca-cert --from-file=ca.crt=path/to/ca.crt
#      kubectl create secret tls kafka-client-certs --cert=path/to/tls.crt --key=path/to/tls.key
#
#   2. Update Helm values.yaml:
#      kafkaSSL:
#        enabled: true
#        useMountedCertificates: true
#        mountPath: "/etc/kafka/ssl"
#        caSecret:
#          name: "kafka-ca-cert"
#          key: "ca.crt"
#        clientSecret:
#          name: "kafka-client-certs"
#          certKey: "tls.crt"
#          keyKey: "tls.key"

kafka:
  enabled: true
  clusters:
    - name: "production-kafka"
      broker: "kafka-broker.example.com:9093"
      security_protocol: "SSL"
      # Use mounted certificate paths
      ssl_ca_cert_path: "/etc/kafka/ssl/ca.crt"
      ssl_client_cert_path: "/etc/kafka/ssl/tls.crt"
      ssl_client_key_path: "/etc/kafka/ssl/tls.key"
      client_id: "holmes-kafka-client"

---

# Option 2: Using base64-encoded certificates (simpler but less secure)
# Prerequisites:
#   1. Encode your certificates in base64:
#      cat ca.crt | base64 -w 0 > ca.crt.b64
#      cat tls.crt | base64 -w 0 > tls.crt.b64
#      cat tls.key | base64 -w 0 > tls.key.b64
#
#   2. Update Helm values.yaml:
#      kafkaSSL:
#        enabled: true
#        useMountedCertificates: false
#        caSecret:
#          name: "kafka-ca-cert"
#          key: "ca.crt"
#        clientSecret:
#          name: "kafka-client-certs"
#          certKey: "tls.crt"
#          keyKey: "tls.key"
#
#   3. Create Kubernetes secrets with base64 content:
#      kubectl create secret generic kafka-ca-cert --from-literal=ca.crt="$(cat ca.crt.b64)"
#      kubectl create secret generic kafka-client-certs \
#        --from-literal=tls.crt="$(cat tls.crt.b64)" \
#        --from-literal=tls.key="$(cat tls.key.b64)"
#
#   4. Set environment variables in the deployment:
#      additionalEnvVars:
#        - name: KAFKA_CA_CERT_BASE64
#          valueFrom:
#            secretKeyRef:
#              name: kafka-ca-cert
#              key: ca.crt
#        - name: KAFKA_CLIENT_CERT_BASE64
#          valueFrom:
#            secretKeyRef:
#              name: kafka-client-certs
#              key: tls.crt
#        - name: KAFKA_CLIENT_KEY_BASE64
#          valueFrom:
#            secretKeyRef:
#              name: kafka-client-certs
#              key: tls.key

kafka:
  enabled: true
  clusters:
    - name: "staging-kafka"
      broker: "kafka-staging.example.com:9093"
      security_protocol: "SSL"
      # Use base64-encoded certificates (passed via environment variables)
      ssl_ca_cert: "{{ env.KAFKA_CA_CERT_BASE64 }}"
      ssl_client_cert: "{{ env.KAFKA_CLIENT_CERT_BASE64 }}"
      ssl_client_key: "{{ env.KAFKA_CLIENT_KEY_BASE64 }}"
      client_id: "holmes-kafka-client"

---

# Option 3: Combining SSL with SASL authentication
# Use SSL for transport security and SASL for authentication

kafka:
  enabled: true
  clusters:
    - name: "secure-kafka"
      broker: "kafka.example.com:9093"
      security_protocol: "SASL_SSL"
      sasl_mechanism: "PLAIN"
      username: "{{ env.KAFKA_USERNAME }}"
      password: "{{ env.KAFKA_PASSWORD }}"
      # SSL certificates for mutual TLS
      ssl_ca_cert_path: "/etc/kafka/ssl/ca.crt"
      ssl_client_cert_path: "/etc/kafka/ssl/tls.crt"
      ssl_client_key_path: "/etc/kafka/ssl/tls.key"
      client_id: "holmes-kafka-client"
